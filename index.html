<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosa Digital</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
padding:20px;
}

.product{
background:#111;
padding:20px;
border-radius:10px;
margin-bottom:15px;
}

button{
background:#ff4da6;
border:none;
padding:10px;
color:#000;
font-weight:bold;
border-radius:8px;
cursor:pointer;
width:100%;
}
</style>

</head>

<body>

<h2>🌸 Rosa Digital</h2>

<div class="product" data-type="auto" data-price="47" data-name="Pack Premium">
<h3>Pack Premium</h3>
<p>R$ 47</p>
<button onclick="buyProduct(this)">Comprar</button>
</div>

<div class="product" data-type="auto" data-price="27" data-name="Pack Básico">
<h3>Pack Básico</h3>
<p>R$ 27</p>
<button onclick="buyProduct(this)">Comprar</button>
</div>

<script>

async function buyProduct(btn) {
const product = btn.closest('.product');

const currentProduct = {
type: product.dataset.type,
price: product.dataset.price,
name: product.dataset.name
};

try {

const response = await fetch('/.netlify/functions/payments', {
method: 'POST',
headers: {
'Content-Type': 'application/json'
},
body: JSON.stringify(currentProduct)
});

const data = await response.json();

console.log(data);

alert("Pagamento criado!");

} catch (error) {

alert("Erro ao criar pagamento");
console.error(error);

}

}

</script>

</body>
</html>
